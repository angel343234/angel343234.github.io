<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Script2Diag — Arquitectura de Sistemas y Diseñador de Diagramas con Mermaid.js">
    <title>Script2Diag — Arquitectura de Sistemas</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Subtle Background Glow -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-layout">

        <!-- Navbar -->
        <header class="navbar" id="appHeader">
            <div class="navbar-brand">
                <div class="logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>Script2Diag</h1>
                    <span class="badge">PRO</span>
                </div>
            </div>

            <div class="navbar-center">
                <div class="toolbar" id="toolbar">
                    <div class="tool-group">
                        <button class="chip" data-template="blank">Lienzo Vacío</button>
                        <button class="chip active" data-template="flowchart">Flowchart</button>
                        <button class="chip" data-template="sequence">Sequence</button>
                        <button class="chip" data-template="class">Class</button>
                        <button class="chip" data-template="state">State</button>
                        <button class="chip" data-template="er">ER</button>
                        <button class="chip" data-template="gantt">Gantt</button>
                        <div class="ui-divider"></div>

                        <div class="select-wrapper">
                            <select id="selectMermaidTheme" class="control-select">
                                <option value="default">Theme: Default</option>
                                <option value="dark">Theme: Dark</option>
                                <option value="forest">Theme: Forest</option>
                                <option value="neutral">Theme: Neutral</option>
                                <option value="base">Theme: Base</option>
                            </select>
                            <svg class="select-icon" width="12" height="12" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6" />
                            </svg>
                        </div>

                        <div class="color-picker-wrapper" title="Color de fondo del lienzo">
                            <input type="color" id="bgColorPicker" value="#ffffff" class="control-color">
                        </div>
                    </div>
                </div>
            </div>

            <div class="navbar-actions">
                <div class="export-group">
                    <div class="input-wrapper">
                        <input type="text" id="diagramName" class="control-input" value="Mi Diagrama"
                            placeholder="Nombre...">
                    </div>
                    <button class="btn btn-primary" id="btnExportPDF" title="Exportar a PDF (Ctrl+S)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        <span>PDF</span>
                    </button>
                    <button class="btn btn-primary" id="btnExportPNG" title="Exportar a PNG"
                        style="background: hsl(160, 84%, 39%);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>PNG</span>
                    </button>
                </div>
                <div class="ui-divider"></div>
                <button class="btn btn-icon" id="btnThemeToggle" title="Cambiar tema GUI">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="btn btn-icon" id="btnFullscreen" title="Modo Pantalla Completa">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="workspace" id="editorMain">

            <!-- Code Editor Panel -->
            <section class="panel panel-code" id="panelCode">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="dot-indicator"></div>
                        <span>Editor Mermaid</span>
                    </div>
                    <div class="panel-tools">
                        <button class="action-btn" id="btnCopyCode" title="Copiar código">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        <button class="action-btn danger" id="btnClearCode" title="Limpiar código">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="editor-container">
                    <div class="line-numbers" id="lineNumbers"></div>
                    <textarea id="codeEditor" spellcheck="false"
                        placeholder="Escribe tu código Mermaid aquí..."></textarea>
                </div>

                <div class="panel-footer">
                    <div class="status-group">
                        <span class="status-dot" id="statusDot"></span>
                        <span class="status-text" id="statusText">Listo</span>
                    </div>
                    <span class="char-count" id="charCount">0 bytes</span>
                </div>
            </section>

            <!-- Resizer -->
            <div class="resizer" id="resizeHandle">
                <div class="resizer-grip"></div>
            </div>

            <!-- Preview Panel -->
            <section class="panel panel-preview" id="panelPreview">
                <div class="panel-header glass">
                    <div class="panel-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <span>Vista Previa</span>
                    </div>
                    <div class="preview-tools">
                        <span class="zoom-level" id="zoomLabel">100%</span>
                        <div class="ui-divider"></div>
                        <button class="action-btn" id="btnZoomOut" title="Alejar">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button class="action-btn" id="btnZoomReset" title="Restablecer">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            </svg>
                        </button>
                        <button class="action-btn" id="btnZoomIn" title="Acercar">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="viewport" id="previewViewport">
                    <div class="canvas-content" id="previewContent">
                        <div id="mermaidOutput"></div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span class="app-credits">
                <strong style="color:var(--text-primary)">Script2Diag</strong>
                <span style="opacity:0.5; margin:0 6px">•</span>
                Desarrollado por Angel Muñoz
                <span style="opacity:0.5; margin:0 6px">•</span>
                Powered by Mermaid.js
            </span>
        </footer>

        <!-- Error Toast -->
        <div class="toast-error" id="errorBar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="errorText">Error de compilación</span>
            <button id="btnDismissError" class="toast-close">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

    </div>

    <!-- Fullscreen Exit Overlay -->
    <button class="btn-exit-fullscreen" id="btnExitFullscreen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3">
            </path>
        </svg>
        Salir de Pantalla Completa
    </button>

    <!-- Dialog -->
    <div class="dialog-backdrop" id="confirmModal">
        <div class="dialog-content">
            <div class="dialog-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </div>
            <h3>Limpiar el lienzo</h3>
            <p>Se borrará todo el código del editor permanentemente. ¿Estás seguro de que deseas continuar?</p>
            <div class="dialog-footer">
                <button class="btn btn-ghost" id="btnConfirmCancel">Cancelar</button>
                <button class="btn btn-danger" id="btnConfirmOk">Sí, vaciar código</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
